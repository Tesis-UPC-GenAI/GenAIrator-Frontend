<header class="header">
  <div class="container">
    <div class="header-content">
      <div class="header-brand">
        <a routerLink="/" class="brand-link">
          <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
            <path d="m12 2 10 5-10 5L2 7Z"></path>
          </svg>
          <span class="brand-text">GenAIrator</span>
        </a>
      </div>

      <nav class="header-nav" [class.is-open]="isMenuOpen" aria-label="Navegación principal">
        <div *ngIf="isAuthenticated" class="nav-links">
          <a
            routerLink="/dashboard"
            routerLinkActive="active"
            class="nav-link"
            (click)="isMenuOpen = false"
          >
            Dashboard
          </a>
          <a
            routerLink="/projects"
            routerLinkActive="active"
            class="nav-link"
            (click)="isMenuOpen = false"
          >
            Proyectos
          </a>
          <a
            routerLink="/import-design-system"
            routerLinkActive="active"
            class="nav-link"
            (click)="isMenuOpen = false"
          >
            ¿Cómo funciona?
          </a>
          <a
            routerLink="/generate"
            routerLinkActive="active"
            class="nav-link"
            (click)="isMenuOpen = false"
          >
            Generar
          </a>
        </div>
      </nav>

      <div class="header-actions">
        <div *ngIf="isAuthenticated && currentUser" class="user-dropdown-container">
          <button class="user-dropdown-trigger" (click)="toggleUserDropdown()">
            <span class="user-name">{{ currentUser.name }}</span>
            <svg class="chevron-icon" [class.rotated]="isUserDropdownOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          
          <div class="user-dropdown-menu" *ngIf="isUserDropdownOpen">
            <a routerLink="/settings" class="dropdown-item" (click)="closeUserDropdown()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
              Configuración
            </a>
            <div class="dropdown-divider"></div>
            <button (click)="logout(); closeUserDropdown()" class="dropdown-item logout-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Cerrar sesión
            </button>
          </div>
        </div>

        <div *ngIf="!isAuthenticated" class="auth-links">
          <a routerLink="/login" class="btn btn-link" (click)="isMenuOpen = false">
            Iniciar sesión
          </a>
          <a routerLink="/register" class="btn btn-primary" (click)="isMenuOpen = false">
            Registrarse
          </a>
        </div>

        <button
          class="menu-toggle hide-desktop"
          (click)="toggleMenu()"
          [attr.aria-expanded]="isMenuOpen"
          aria-label="Abrir menú de navegación"
        >
          <span class="menu-icon"></span>
        </button>
      </div>
    </div>
  </div>
</header>
