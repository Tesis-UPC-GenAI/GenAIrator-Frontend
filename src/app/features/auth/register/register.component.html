<div class="register-container">
  <div class="register-wrapper">
    <app-card>
      <div class="register-header">
        <h1 class="text-2xl font-bold text-center">Crear Cuenta</h1>
        <p class="text-secondary text-center mt-sm">
          Únete a GenAI Platform
        </p>
      </div>

      <div
        *ngIf="errorMessage"
        class="alert alert-error"
        role="alert"
        aria-live="polite">
        {{ errorMessage }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="name" class="form-label">
            Nombre completo
            <span class="text-error" aria-label="requerido">*</span>
          </label>
          <input
            id="name"
            type="text"
            formControlName="name"
            class="form-input"
            placeholder="Tu nombre"
            [attr.aria-invalid]="name?.invalid && name?.touched"
            [attr.aria-describedby]="name?.invalid && name?.touched ? 'name-error' : null"
            aria-required="true"
          />
          <div
            *ngIf="getNameError()"
            id="name-error"
            class="form-error"
            role="alert">
            {{ getNameError() }}
          </div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">
            Email
            <span class="text-error" aria-label="requerido">*</span>
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="tu@email.com"
            [attr.aria-invalid]="email?.invalid && email?.touched"
            [attr.aria-describedby]="email?.invalid && email?.touched ? 'email-error' : null"
            aria-required="true"
          />
          <div
            *ngIf="getEmailError()"
            id="email-error"
            class="form-error"
            role="alert">
            {{ getEmailError() }}
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">
            Contraseña
            <span class="text-error" aria-label="requerido">*</span>
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-input"
            placeholder="••••••••"
            [attr.aria-invalid]="password?.invalid && password?.touched"
            [attr.aria-describedby]="password?.invalid && password?.touched ? 'password-error' : null"
            aria-required="true"
          />
          <div
            *ngIf="getPasswordError()"
            id="password-error"
            class="form-error"
            role="alert">
            {{ getPasswordError() }}
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">
            Confirmar contraseña
            <span class="text-error" aria-label="requerido">*</span>
          </label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            class="form-input"
            placeholder="••••••••"
            [attr.aria-invalid]="confirmPassword?.invalid && confirmPassword?.touched"
            [attr.aria-describedby]="confirmPassword?.invalid && confirmPassword?.touched ? 'confirmPassword-error' : null"
            aria-required="true"
          />
          <div
            *ngIf="getConfirmPasswordError()"
            id="confirmPassword-error"
            class="form-error"
            role="alert">
            {{ getConfirmPasswordError() }}
          </div>
        </div>

        <app-button
          type="submit"
          variant="primary"
          [disabled]="registerForm.invalid"
          [loading]="isLoading"
          style="width: 100%;">
          {{ isLoading ? 'Registrando...' : 'Crear Cuenta' }}
        </app-button>
      </form>

      <div class="register-footer">
        <p class="text-center text-secondary">
          ¿Ya tienes una cuenta?
          <a routerLink="/login" class="link-primary">Inicia sesión aquí</a>
        </p>
      </div>
    </app-card>
  </div>
</div>
