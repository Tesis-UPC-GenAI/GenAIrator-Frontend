<div class="login-container">
  <div class="login-wrapper">
    <app-card>
      <div class="login-header">
        <h1 class="text-2xl font-bold text-center">Iniciar Sesión</h1>
        <p class="text-secondary text-center mt-sm">
          Accede a tu cuenta de GenAIrator
        </p>
      </div>

      <div
        *ngIf="errorMessage"
        class="alert alert-error"
        role="alert"
        aria-live="polite">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">
            Email
            <span class="text-error" aria-label="requerido">*</span>
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="tu@email.com"
            [attr.aria-invalid]="email?.invalid && email?.touched"
            [attr.aria-describedby]="email?.invalid && email?.touched ? 'email-error' : null"
            aria-required="true"
          />
          <div
            *ngIf="getEmailError()"
            id="email-error"
            class="form-error"
            role="alert">
            {{ getEmailError() }}
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">
            Contraseña
            <span class="text-error" aria-label="requerido">*</span>
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-input"
            placeholder="••••••••"
            [attr.aria-invalid]="password?.invalid && password?.touched"
            [attr.aria-describedby]="password?.invalid && password?.touched ? 'password-error' : null"
            aria-required="true"
          />
          <div
            *ngIf="getPasswordError()"
            id="password-error"
            class="form-error"
            role="alert">
            {{ getPasswordError() }}
          </div>
        </div>

        <app-button
          type="submit"
          variant="primary"
          [disabled]="loginForm.invalid"
          [loading]="isLoading"
          style="width: 100%;">
          {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
        </app-button>
      </form>

      <div class="login-footer">
        <p class="text-center text-secondary">
          ¿No tienes una cuenta?
          <a routerLink="/register" class="link-primary">Regístrate aquí</a>
        </p>
      </div>

      <div class="demo-info">
        <p class="text-xs text-secondary text-center">
          <strong>Demo:</strong> admin@genai.com / admin123
        </p>
      </div>
    </app-card>
  </div>
</div>
